<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영적 전쟁: 내 생각의 CCTV</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --background: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --accent: #ef4444;
        }
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 450px;
            background: var(--surface);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }
        h2 {
            text-align: center;
            color: var(--text);
            margin-bottom: 5px;
            font-size: 1.5rem;
        }
        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #cbd5e1;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background-color: var(--background);
            border: 1px solid #475569;
            border-radius: 6px;
            color: white;
            font-size: 1rem;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent);
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #dc2626;
        }
        .hidden { display: none; }
        .log-list {
            margin-top: 25px;
            border-top: 1px solid #475569;
            padding-top: 20px;
        }
        .log-item {
            background: rgba(15, 23, 42, 0.6);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 4px solid var(--accent);
        }
        .log-date {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 4px;
        }
        .log-type {
            font-weight: bold;
            color: #fca5a5;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 1단계: 로그인 화면 -->
    <div id="login-section">
        <h2>영적 전쟁: 내 생각의 CCTV</h2>
        <div class="subtitle">모든 생각을 사로잡아 그리스도께 복종하라</div>
        <div class="form-group">
            <label for="username">이름을 입력하세요</label>
            <input type="text" id="username" placeholder="이름 입력">
        </div>
        <button onclick="login()">로그인 및 접속</button>
    </div>

    <!-- 2단계: 메인 기록 화면 -->
    <div id="main-section" class="hidden">
        <h2><span id="user-display"></span> 청소년의 영적 상태</h2>
        <div class="subtitle">오늘 내 마음에 틈타는 진짜 귀신(마귀의 생각)을 적으라</div>
        
        <div class="form-group">
            <label for="ghost-type">어떤 통로로 마귀가 공작을 펼치나요?</label>
            <select id="ghost-type">
                <option value="미움/분노 (모두 다 싫어)">미움/분노 (모두 다 싫어)</option>
                <option value="돈/성공 집착 (돈이 최고야)">돈/성공 집착 (돈이 최고야)</option>
                <option value="외모/명품/비교 (내가 제일 예뻐야 해)">외모/명품/비교 (내가 제일 예뻐야 해)</option>
                <option value="음란/미디어 중독">음란/미디어 중독</option>
                <option value="미래 학업 두려움/염려">미래 학업 두려움/염려</option>
            </select>
        </div>

        <div class="form-group">
            <label for="ghost-detail">내 머릿속에 들어오는 구체적인 마귀의 속삭임은?</label>
            <textarea id="ghost-detail" rows="4" placeholder="예: '공부 안 하면 네 인생 끝이야'라는 두려움이 밀려옵니다."></textarea>
        </div>

        <button onclick="saveLog()">내 생각 영적 포획하기</button>

        <!-- 누적 기록 확인 확인 -->
        <div class="log-list">
            <label>수련회까지 모인 나의 영적 전투 기록</label>
            <div id="log-container"></div>
        </div>
    </div>
</div>

<script>
    let currentUser = "";

    function login() {
        const nameInput = document.getElementById("username").value.trim();
        if(!nameInput) {
            alert("이름을 입력해주세요!");
            return;
        }
        currentUser = nameInput;
        document.getElementById("user-display").innerText = currentUser;
        document.getElementById("login-section").classList.add("hidden");
        document.getElementById("main-section").classList.remove("hidden");
        loadLogs();
    }

    function saveLog() {
        const type = document.getElementById("ghost-type").value;
        const detail = document.getElementById("ghost-detail").value.trim();
        
        if(!detail) {
            alert("마귀가 주는 구체적인 생각을 적어주세요!");
            return;
        }

        const logContainer = JSON.parse(localStorage.getItem("spiritual_logs") || "[]");
        const newLog = {
            user: currentUser,
            type: type,
            detail: detail,
            date: new Date().toLocaleString('ko-KR')
        };

        logContainer.push(newLog);
        localStorage.setItem("spiritual_logs", JSON.stringify(logContainer));
        
        document.getElementById("ghost-detail").value = "";
        alert("생각을 사로잡아 보관함에 넣었습니다!");
        loadLogs();
    }

    function loadLogs() {
        const logContainer = JSON.parse(localStorage.getItem("spiritual_logs") || "[]");
        const containerHtml = document.getElementById("log-container");
        containerHtml.innerHTML = "";

        // 현재 로그인한 사용자의 데이터만 필터링
        const userLogs = logContainer.filter(log => log.user === currentUser).reverse();

        if(userLogs.length === 0) {
            containerHtml.innerHTML = "<div style='color:#64748b; font-size:0.9rem; text-align:center; padding:10px;'>기록된 영적 진이 없습니다.</div>";
            return;
        }

        userLogs.forEach(log => {
            const item = document.createElement("div");
            item.className = "log-item";
            item.innerHTML = `
                <div class="log-date">${log.date}</div>
                <div class="log-type">[${log.type}]</div>
                <div style="margin-top:5px; font-size:0.95rem;">${log.detail}</div>
            `;
            containerHtml.appendChild(item);
        });
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영적 전쟁: 내 생각의 CCTV</title>
    <style>
        :root {
            --background: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --accent: #ef4444;
            --primary: #38bdf8;
        }
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            padding: 30px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }
        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #cbd5e1;
            font-size: 1.05rem;
            text-align: center;
        }
        input, textarea {
            width: 100%;
            padding: 14px;
            box-sizing: border-box;
            background-color: var(--background);
            border: 1px solid #475569;
            border-radius: 8px;
            color: white;
            font-size: 1.05rem;
            text-align: center;
        }
        textarea {
            text-align: left;
            resize: none;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--accent);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #dc2626;
        }
        .hidden { display: none; }
        
        /* 내 이름 상단 표시 스타일 */
        .user-header {
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 20px;
        }
        
        /* 탭(주차) 스타일 */
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid #475569;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            cursor: pointer;
            color: #94a3b8;
            font-weight: bold;
            font-size: 0.95rem;
            transition: 0.3s;
        }
        .tab.active {
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
        }

        .log-box {
            margin-top: 25px;
            background: rgba(15, 23, 42, 0.6);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--accent);
            font-size: 1rem;
            line-height: 1.5;
        }
        .log-date {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 1단계: 로그인 화면 -->
    <div id="login-section">
        <h2>영적 전쟁: 내 생각의 CCTV</h2>
        <div class="form-group">
            <label for="username">이름을 입력하세요</label>
            <input type="text" id="username" placeholder="이름 입력" autocomplete="off">
        </div>
        <button onclick="login()">로그인</button>
    </div>

    <!-- 2단계: 메인 기록 화면 -->
    <div id="main-section" class="hidden">
        <!-- 상단에 이름만 고정 노출 -->
        <div class="user-header">👤 <span id="user-display"></span></div>
        
        <!-- 주차 선택 탭 -->
        <div class="tabs">
            <div class="tab active" id="tab-1" onclick="selectWeek(1)">1주차</div>
            <div class="tab" id="tab-2" onclick="selectWeek(2)">2주차</div>
            <div class="tab" id="tab-3" onclick="selectWeek(3)">3주차</div>
            <div class="tab" id="tab-4" onclick="selectWeek(4)">4주차</div>
        </div>

        <div class="form-group">
            <label for="ghost-detail">지금 내 머릿속에 있는 귀신은 무엇인가?</label>
            <textarea id="ghost-detail" rows="5" placeholder="솔직하게 마귀가 주는 생각을 적어보세요."></textarea>
        </div>

        <button onclick="saveLog()">영적 포획하기</button>

        <!-- 오늘 적은 내용 확인 박스 -->
        <div id="log-container"></div>
    </div>
</div>

<script>
    let currentUser = "";
    let currentWeek = 1;

    function login() {
        const nameInput = document.getElementById("username").value.trim();
        if(!nameInput) {
            alert("이름을 입력해주세요!");
            return;
        }
        currentUser = nameInput;
        document.getElementById("user-display").innerText = currentUser;
        document.getElementById("login-section").classList.add("hidden");
        document.getElementById("main-section").classList.remove("hidden");
        
        // 로그인 시 기본으로 1주차 활성화
        selectWeek(1); 
    }

    function selectWeek(week) {
        currentWeek = week;
        
        // 탭 디자인 변경 (선택된 주차에 파란색 밑줄)
        for(let i=1; i<=4; i++) {
            document.getElementById("tab-" + i).classList.remove("active");
        }
        document.getElementById("tab-" + week).classList.add("active");

        // 다른 주차로 넘어갈 때 텍스트 입력창 비우기
        document.getElementById("ghost-detail").value = "";
        
        // 선택한 주차의 기록 불러오기
        loadLogs();
    }

    function saveLog() {
        const detail = document.getElementById("ghost-detail").value.trim();
        
        if(!detail) {
            alert("내용을 입력해주세요!");
            return;
        }

        // 주차별 데이터를 저장하기 위해 새로운 키(spiritual_logs_weeks) 사용
        const logContainer = JSON.parse(localStorage.getItem("spiritual_logs_weeks") || "[]");
        
        // 현재 유저의 '현재 선택된 주차' 기록만 제외하고 남김 (덮어쓰기를 위함)
        const filteredContainer = logContainer.filter(log => !(log.user === currentUser && log.week === currentWeek));

        const newLog = {
            user: currentUser,
            week: currentWeek,
            detail: detail,
            date: new Date().toLocaleString('ko-KR')
        };

        filteredContainer.push(newLog);
        localStorage.setItem("spiritual_logs_weeks", JSON.stringify(filteredContainer));
        
        document.getElementById("ghost-detail").value = "";
        alert(currentWeek + "주차 생각을 성공적으로 포획하여 보관했습니다!");
        loadLogs();
    }

    function loadLogs() {
        const logContainer = JSON.parse(localStorage.getItem("spiritual_logs_weeks") || "[]");
        const containerHtml = document.getElementById("log-container");
        containerHtml.innerHTML = "";

        // 현재 로그인한 사용자의 '선택된 주차' 기록만 찾기
        const userLog = logContainer.find(log => log.user === currentUser && log.week === currentWeek);

        if(!userLog) return;

        // 기록이 있으면 화면 하단에 표시
        const item = document.createElement("div");
        item.className = "log-box";
        item.innerHTML = `
            <div class="log-date">포획 시간: ${userLog.date}</div>
            <div><strong>${currentWeek}주차에 내가 포획한 귀신:</strong></div>
            <div style="margin-top:8px; color:#fca5a5;">${userLog.detail}</div>
        `;
        containerHtml.appendChild(item);
    }
</script>
</body>
</html>

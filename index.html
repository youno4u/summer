<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영적 전쟁: 내 생각의 CCTV</title>
    <style>
        :root {
            --background: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --accent: #ef4444;
            --primary: #38bdf8;
        }
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            padding: 30px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }
        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #cbd5e1;
            font-size: 1.05rem;
            text-align: center;
        }
        input, textarea {
            width: 100%;
            padding: 14px;
            box-sizing: border-box;
            background-color: var(--background);
            border: 1px solid #475569;
            border-radius: 8px;
            color: white;
            font-size: 1.05rem;
            text-align: center;
        }
        textarea {
            text-align: left;
            resize: none;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--accent);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #dc2626;
        }
        .hidden { display: none; }
        
        /* 내 이름 상단 표시 스타일 */
        .user-header {
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #475569;
        }

        .log-box {
            margin-top: 25px;
            background: rgba(15, 23, 42, 0.6);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--accent);
            font-size: 1rem;
            line-height: 1.5;
        }
        .log-date {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 1단계: 로그인 화면 -->
    <div id="login-section">
        <h2>영적 전쟁: 내 생각의 CCTV</h2>
        <div class="form-group">
            <label for="username">이름을 입력하세요</label>
            <input type="text" id="username" placeholder="이름 입력" autocomplete="off">
        </div>
        <button onclick="login()">로그인</button>
    </div>

    <!-- 2단계: 메인 기록 화면 -->
    <div id="main-section" class="hidden">
        <!-- 상단에 이름만 고정 노출 -->
        <div class="user-header">👤 <span id="user-display"></span></div>

        <div class="form-group">
            <label for="ghost-detail">지금 내 머릿속에 있는 귀신은 무엇인가?</label>
            <textarea id="ghost-detail" rows="5" placeholder="예: '친구보다 시험 못 보면 난 패배자야'라는 두려움, 자꾸 스마트폰을 보고 싶은 유혹 등 마귀가 주는 생각을 솔직하게 적어보세요."></textarea>
        </div>

        <button onclick="saveLog()">영적 포획하기</button>

        <!-- 오늘 적은 내용 확인 박스 -->
        <div id="log-container"></div>
    </div>
</div>

<script>
    let currentUser = "";

    function login() {
        const nameInput = document.getElementById("username").value.trim();
        if(!nameInput) {
            alert("이름을 입력해주세요!");
            return;
        }
        currentUser = nameInput;
        document.getElementById("user-display").innerText = currentUser;
        document.getElementById("login-section").classList.add("hidden");
        document.getElementById("main-section").classList.remove("hidden");
        loadLogs();
    }

    function saveLog() {
        const detail = document.getElementById("ghost-detail").value.trim();
        
        if(!detail) {
            alert("내용을 입력해주세요!");
            return;
        }

        const logContainer = JSON.parse(localStorage.getItem("spiritual_logs_final") || "[]");
        
        // 기존에 이 이름으로 적었던 기록이 있다면 지우고 최신 내용으로 1개만 유지
        const filteredContainer = logContainer.filter(log => log.user !== currentUser);

        const newLog = {
            user: currentUser,
            detail: detail,
            date: new Date().toLocaleString('ko-KR')
        };

        filteredContainer.push(newLog);
        localStorage.setItem("spiritual_logs_final", JSON.stringify(filteredContainer));
        
        document.getElementById("ghost-detail").value = "";
        alert("생각을 성공적으로 포획하여 보관했습니다!");
        loadLogs();
    }

    function loadLogs() {
        const logContainer = JSON.parse(localStorage.getItem("spiritual_logs_final") || "[]");
        const containerHtml = document.getElementById("log-container");
        containerHtml.innerHTML = "";

        const userLog = logContainer.find(log => log.user === currentUser);

        if(!userLog) return;

        const item = document.createElement("div");
        item.className = "log-box";
        item.innerHTML = `
            <div class="log-date">포획 시간: ${userLog.date}</div>
            <div><strong>내가 포획한 귀신의 실체:</strong></div>
            <div style="margin-top:8px; color:#fca5a5;">${userLog.detail}</div>
        `;
        containerHtml.appendChild(item);
    }
</script>
</body>
</html>
